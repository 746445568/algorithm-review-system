name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install desktop dependencies
        working-directory: apps/desktop-electron
        run: npm ci

      - name: Build ojreviewd
        working-directory: apps/server
        shell: bash
        run: |
          go build -o ../desktop-electron/bin/ojreviewd.exe ./cmd/ojreviewd

      - name: Build Electron release artifacts
        working-directory: apps/desktop-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dist-${{ github.ref_name }}
          path: apps/desktop-electron/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: apps/desktop-electron/dist/*
